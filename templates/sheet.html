<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheet - Verifio</title>

<link rel="icon" href="/static/images/logo.png">
<link rel="stylesheet" href="/static/css/sheet.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Verifio</h2>

        <ul>
            <li onclick="Home()"><i class="fa fa-home"></i> Home</li>
            <li onclick="Projects()"><i class="fa fa-folder"></i> Projects</li>
            <li class="active"><i class="fa fa-table"></i> Sheet</li>
            <li onclick="Analytics()"><i class="fa fa-chart-pie"></i> Analytics</a></li>
            <li onclick="Verified()"><i class="fa fa-check-circle"></i> Verified</li>
            <li onclick="Fake()"><i class="fa fa-times-circle"></i> Fake</li>
            <li  onclick="Profile()"><i class="fa fa-user"></i> Profile</li>
            <li onclick="Logout()"><i class="fa fa-sign-out-alt"></i> Logout</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1 style="padding-bottom: 25px; padding-left: 1px;">Project Sheets</h1>

        <table>
            <tr>
                <th>Project Name</th>
                <th>Total Certificates</th>
                <th>Download</th>
            </tr>
            {% if projects %}
            {% for p in projects %}
                <tr>
                    <td>{{ p.project_name }}</td>
                    <td>{{ p.verified_count + p.fake_count }}</td>
                    <td>
                        <button onclick="downloadSheet('{{ p.project_name }}')">
                            <i class="fa fa-download"></i> Download
                        </button>
                    </td>
                </tr>
            {% endfor %}
            {% endif %}
        </table>

    </div>

</div>

<script>
function Home() {
    window.location.href = "/home";
}
function Projects(){
    window.location.href = "/projects";
}
function Analytics(){
    window.location.href = "/analytics";
}
function Verified(){
    window.location.href = "/verified";
}
function Fake(){
    window.location.href = "/fake";
}

function Profile(){
    window.location.href = "/profile";
}
function Logout(){
    window.location.href = "/logout";
}
function downloadSheet(project_name) {
    console.log("Downloading:", project_name);
    fetch(`/download/${project_name}`)
        .then(response => {
            if (!response.ok) {
                throw new Error("Download failed");
            }
            return response.blob();
        })
        .then(blob => {

            let url = window.URL.createObjectURL(blob);

            let a = document.createElement("a");
            a.href = url;
            a.download = `${project_name}.xlsx`;

            document.body.appendChild(a);
            a.click();

            a.remove();
            window.URL.revokeObjectURL(url);

        })
        .catch(err => {
            alert("❌ Download failed!");
            console.error(err);
        });
}
</script>

</body>
</html>
